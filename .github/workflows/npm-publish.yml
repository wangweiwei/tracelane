name: npm Publish

# 推送 v*.*.* tag 即自动发布到 npm。NPM_TOKEN 需在仓库 Secrets 中配置。
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG_VERSION: ${{ github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Bump version from tag
        run: pnpm run version
      - name: Build
        run: pnpm run build
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version bump back to default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # tag 触发时 checkout 的是落后于 main 的 detached HEAD;回写必须基于 main 当前 tip,
          # 否则 push HEAD:main 会 non-fast-forward 被拒。改为:取最新 main → 在其之上重算版本 → 提交。
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -f -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          pnpm run version
          if git diff --quiet -- package.json; then
            echo "main 已是 v${TAG_VERSION#v},无需回写。"
          else
            git add package.json
            git commit -m "chore(release): v${TAG_VERSION#v}"
            git push origin "${DEFAULT_BRANCH}"
          fi
