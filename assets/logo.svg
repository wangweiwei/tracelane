<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 80" width="264" height="80" role="img" aria-label="tracelane">
  <title>tracelane</title>
  <style>
    .wm {
      fill: #1f2933;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
    }
    .accent { fill: #378ADD; }
    @media (prefers-color-scheme: dark) {
