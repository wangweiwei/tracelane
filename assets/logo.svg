  <rect x="22" y="24" width="38" height="8" rx="4" fill="#378ADD"/>
  <rect x="30" y="36" width="30" height="8" rx="4" fill="#BA7517"/>
  <rect x="38" y="48" width="22" height="8" rx="4" fill="#1D9E75"/>
  <path d="M66 23 L71 28 L66 33 L61 28 Z" fill="#D4537E"/>
  <!-- wordmark -->
  <text class="wm" x="90" y="51" font-size="33" letter-spacing="-0.5">Trace<tspan class="accent">lane</tspan></text>
