<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 首绘前定主题(默认暗色),消除亮→暗闪烁;nav.ts 随后会接管切换
      (function () {
        var t = 'dark';
        try { if (localStorage.getItem('tl-theme') === 'light') t = 'light'; } catch (e) {}
        document.documentElement.dataset.theme = t;
        if (t === 'dark') {
          var s = document.createElement('style');
          s.textContent =
            'html[data-theme="dark"]{--text:#ececec;--text-2:#a8a8a8;--bg:#191a1d;--panel:#25262b;--border:rgba(255,255,255,.10);color-scheme:dark}';
          document.head.appendChild(s);
        }
      })();
    </script>
    <title>Tracelane — Full-link trace timeline & causal-tree waterfall (Canvas, zero-dependency)</title>
    <meta
      name="description"
      content="Tracelane is a zero-dependency, framework-agnostic TypeScript + Canvas library that renders full-link user-behavior traces and distributed spans as a zoomable, collapsible causal-tree waterfall. Works in React, Vue, and vanilla JS. MIT licensed."
    />
    <meta
      name="keywords"
      content="tracelane, trace timeline, trace viewer, distributed tracing, causal-tree waterfall, span waterfall, gantt, flamegraph, observability, apm, canvas visualization, typescript, zero-dependency"
    />
    <meta name="author" content="wangweiwei" />
    <link rel="canonical" href="https://github.com/wangweiwei/tracelane" />
    <meta name="theme-color" content="#191a1d" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tracelane — Full-link trace timeline & causal-tree waterfall" />
    <meta
      property="og:description"
      content="Zero-dependency TypeScript + Canvas library for visualizing full-link user-behavior traces and distributed spans as a zoomable, collapsible causal-tree waterfall. React / Vue / vanilla."
    />
    <meta property="og:url" content="https://github.com/wangweiwei/tracelane" />
    <meta property="og:image" content="https://raw.githubusercontent.com/wangweiwei/tracelane/main/assets/logo.svg" />
    <meta property="og:site_name" content="Tracelane" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tracelane — Full-link trace timeline & causal-tree waterfall" />
    <meta
      name="twitter:description"
      content="Zero-dependency TypeScript + Canvas library for full-link trace waterfalls. Infinite zoom, sibling folding, virtualized rows. React / Vue / vanilla, MIT."
    />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/wangweiwei/tracelane/main/assets/logo.svg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Tracelane",
        "description": "Zero-dependency, framework-agnostic TypeScript + Canvas library that renders full-link traces and distributed spans as a zoomable, collapsible causal-tree waterfall.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "programmingLanguage": "TypeScript",
        "license": "https://opensource.org/licenses/MIT",
        "author": { "@type": "Person", "name": "wangweiwei" },
        "url": "https://github.com/wangweiwei/tracelane",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --text: #1f1f1f;
        --text-2: #6e6e6e;
        --bg: #fafaf8;
        --panel: #f1f1ee;
        --border: rgba(0, 0, 0, 0.1);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      .page { max-width: 1080px; margin: 0 auto; padding: 28px 24px 60px; }
      header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
      h1 { font-size: 20px; margin: 0; letter-spacing: 0.02em; }
      h1 .mark { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--text-2); }
      .hint { font-size: 13px; color: var(--text-2); margin: 6px 0 14px; }
      .bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
      .legend { display: flex; gap: 13px; flex-wrap: wrap; font-size: 12px; color: var(--text-2); margin-right: auto; }
      .chip { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: -1px; margin-right: 4px; }
      .legend-item { display: inline-flex; align-items: center; padding: 2px 6px; border: 0; border-radius: 6px; background: transparent; color: var(--text-2); font: inherit; font-size: 12px; cursor: pointer; }
      .legend-item:hover { background: var(--panel); }
      .legend-item.is-off { opacity: 0.4; text-decoration: line-through; }
      button {
        font-size: 13px; padding: 4px 10px; border-radius: 6px;
        border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer;
      }
      button:hover { background: var(--panel); }
      #timeline { margin-bottom: 4px; }
      #detail {
        display: none; margin-top: 14px; background: var(--panel);
        border-radius: 12px; padding: 12px 16px; font-size: 13px; line-height: 1.7;
      }
      #detail .name { display: flex; align-items: center; gap: 8px; font-weight: 500; margin-bottom: 4px; }
      #detail .sub { color: var(--text-2); }
    </style>
  </head>
  <body>
    <div class="page">
      <div id="page-head"></div>
      <div class="bar">
        <div class="legend" id="legend"></div>
        <button id="zoom-in" aria-label="放大时间轴">＋</button>
        <button id="zoom-out" aria-label="缩小时间轴">－</button>
        <button id="collapse-all">全部收起</button>
        <button id="reset">复位</button>
      </div>
      <div id="timeline"></div>
      <div id="detail"></div>
    </div>
    <script type="module" src="/nav.ts"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
